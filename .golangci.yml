version: "2"

linters:
  default: standard
  settings:
    errcheck:
      exclude-functions:
        - (*database/sql.DB).Close
        - (*database/sql.DB).Exec
        - (*database/sql.Rows).Close
        - (*database/sql.Rows).Scan
        - (*database/sql.Stmt).Close
        - (*database/sql.Tx).Rollback
        - (*database/sql.Conn).Close
        - (*database/sql.Conn).Raw
        - (*os.File).Close
        - (*os.File).Write
        - os.Remove
        - (io.Closer).Close
        - (database/sql/driver.Stmt).Close
        - (database/sql/driver.Rows).Close
  exclusions:
    presets:
      - std-error-handling
    rules:
      # Disable errcheck in test files — upstream go-sqlite3 tests intentionally
      # ignore errors on cleanup/setup calls throughout
      - path: _test\.go
        linters:
          - errcheck
      # convert.go is upstream go-sqlite3 code kept for compatibility
      - path: convert\.go
        linters:
          - unused
      # Upstream error strings are capitalized — not worth changing
      - linters:
          - staticcheck
        text: "ST1005"
      # Upstream ineffectual assignments in tests
      - path: _test\.go
        linters:
          - ineffassign
    paths:
      - _example
      - upgrade
      - util

formatters:
  enable:
    - gofmt
