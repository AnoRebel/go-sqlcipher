name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  # Wait for CI to pass before releasing
  ci:
    uses: ./.github/workflows/ci.yml

  release:
    needs: ci
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6
      with:
        fetch-depth: 0

    - name: Generate release notes
      id: notes
      run: |
        # Get previous tag
        PREV_TAG=$(git tag --sort=-version:refname | grep '^v' | sed -n '2p')
        if [ -z "$PREV_TAG" ]; then
          echo "body=Initial release" >> "$GITHUB_OUTPUT"
        else
          NOTES=$(git log --pretty=format:"- %s" "$PREV_TAG"..HEAD)
          {
            echo "body<<EOFNOTES"
            echo "## Changes since $PREV_TAG"
            echo ""
            echo "$NOTES"
            echo "EOFNOTES"
          } >> "$GITHUB_OUTPUT"
        fi

    - name: Create GitHub release
      uses: softprops/action-gh-release@v2
      with:
        generate_release_notes: true
        body: ${{ steps.notes.outputs.body }}
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # Notify Go module proxy to cache the new version
  gomod:
    needs: release
    runs-on: ubuntu-latest
    steps:
    - name: Trigger pkg.go.dev update
      run: |
        TAG=${GITHUB_REF#refs/tags/}
        curl -s "https://proxy.golang.org/github.com/!ano!rebel/go-sqlcipher/@v/${TAG}.info" || true
        curl -s "https://pkg.go.dev/github.com/AnoRebel/go-sqlcipher@${TAG}" || true
